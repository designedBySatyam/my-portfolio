<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Satyam Pandey - Get in touch for software development projects and collaborations">
    <title>Contact | Satyam Pandey</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contact.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <!-- Animated Background Blob -->
    <div class="blob" aria-hidden="true"></div>
    
    <!-- Dark Mode Toggle -->
    <button class="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode">
        🌙
    </button>

    <!-- Main Contact Section -->
    <main class="contact-container">
        <div class="contact-card">
            <div class="contact-main-grid">
                
                <!-- Left Column: Form -->
                <div class="contact-left">
                    <div class="contact-header">
                        <h1>Let's Connect</h1>
                        <p>Ready to discuss software architecture, digital systems, or your next big idea? I'd love to hear from you!</p>
                    </div>
                    
                    <form id="contact-form" aria-label="Contact form">
                        <div class="input-group">
                            <input 
                                type="text" 
                                name="user_name" 
                                placeholder="Your Name" 
                                required 
                                aria-label="Your name"
                            >
                            <input 
                                type="email" 
                                name="user_email" 
                                placeholder="Your Email" 
                                required 
                                aria-label="Your email"
                            >
                            <textarea 
                                name="message" 
                                placeholder="Your Message" 
                                rows="5" 
                                required 
                                aria-label="Your message"
                            ></textarea>
                        </div>
                        <button type="submit" class="submit-btn">
                            Send Message
                        </button>
                    </form>
                    
                    <a href="../index.html" class="back-link">
                        <i data-lucide="arrow-left" aria-hidden="true"></i> 
                        Back to Home
                    </a>
                </div>

                <!-- Right Column: Social Links -->
                <aside class="contact-right">
                    <h3>Quick Connections</h3>
                    <div class="social-column">
                        <a 
                            href="https://github.com/designedBySatyam" 
                            class="social-card" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            aria-label="Visit GitHub profile"
                        >
                            <div class="icon-box">
                                <i data-lucide="github" aria-hidden="true"></i>
                            </div>
                            <div class="social-text">
                                <span class="platform">GitHub</span>
                                <span class="username">@designedBySatyam</span>
                            </div>
                        </a>

                        <a 
                            href="https://www.linkedin.com/in/satyampandey27" 
                            class="social-card" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            aria-label="Visit LinkedIn profile"
                        >
                            <div class="icon-box">
                                <i data-lucide="linkedin" aria-hidden="true"></i>
                            </div>
                            <div class="social-text">
                                <span class="platform">LinkedIn</span>
                                <span class="username">Satyam Pandey</span>
                            </div>
                        </a>

                        <a 
                            href="mailto:hello.satyam27@gmail.com" 
                            class="social-card"
                            aria-label="Send email"
                        >
                            <div class="icon-box">
                                <i data-lucide="mail" aria-hidden="true"></i>
                            </div>
                            <div class="social-text">
                                <span class="platform">Email</span>
                                <span class="username">hello.satyam27@gmail.com</span>
                            </div>
                        </a>
                    </div>
                </aside>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/script.js"></script>
    <script src="../js/contact.js"></script>
</body>
</html>
