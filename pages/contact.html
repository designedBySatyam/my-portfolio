<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Satyam Pandey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contact.css">
    <script src="js/auth.js"></script>
</head>
<body>
    <div class="blob"></div>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>

    <div class="contact-container">
        <div class="contact-card">
            <div class="contact-main-grid">
                
                <div class="contact-left">
                    <div class="contact-header">
                        <h1>Let's Connect</h1>
                        <p>Ready to discuss software architecture, web development, or your next big idea? Drop me a message!</p>
                    </div>
                    
                    <form id="contact-form">
                        <div class="input-group">
                            <div class="form-field">
                                <label for="user_name">Your Name</label>
                                <input type="text" id="user_name" name="user_name" placeholder="John Doe" required>
                            </div>
                            
                            <div class="form-field">
                                <label for="user_email">Your Email</label>
                                <input type="email" id="user_email" name="user_email" placeholder="john@example.com" required>
                            </div>
                            
                            <div class="form-field">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" placeholder="Tell me about your project..." rows="5" required></textarea>
                            </div>
                        </div>
                        <button type="submit" class="submit-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            Send Message
                        </button>
                    </form>
                    
                    <a href="../index.html" class="back-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        Back to Home
                    </a>
                </div>

                <div class="contact-right">
                    <h3>Quick Connections</h3>
                    <div class="social-column">
                        <a href="https://github.com/designedBySatyam" class="social-card" target="_blank" rel="noopener noreferrer">
                            <div class="icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                            </div>
                            <div class="social-text">
                                <span class="platform">GitHub</span>
                                <span class="username">@designedBySatyam</span>
                            </div>
                        </a>

                        <a href="https://www.linkedin.com/in/satyampandey27" class="social-card" target="_blank" rel="noopener noreferrer">
                            <div class="icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                            </div>
                            <div class="social-text">
                                <span class="platform">LinkedIn</span>
                                <span class="username">Satyam Pandey</span>
                            </div>
                        </a>

                        <a href="mailto:hello.satyam27@gmail.com" class="social-card">
                            <div class="icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </div>
                            <div class="social-text">
                                <span class="platform">Email</span>
                                <span class="username">hello.satyam27@gmail.com</span>
                            </div>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>
        
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("ERcS2hOvR_hVjIE4G");
        })();
    </script>

    <script src="../js/contact.js"></script>
</body>
</html>
