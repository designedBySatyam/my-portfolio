<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projects and certifications by Satyam Pandey — web apps, tools, and achievements.">
  <meta name="robots" content="index, follow">
  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Satyam Pandey">
  <meta property="og:title"       content="Projects & Certificates | Satyam Pandey">
  <meta property="og:description" content="Web apps, tools and certifications built by Satyam Pandey.">
  <meta property="og:image"       content="https://raw.githubusercontent.com/designedBySatyam/assets/main/images/og-image.webp">
  <meta property="og:url"         content="https://satyampandey.dev/pages/projects.html">
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Projects & Certificates | Satyam Pandey">
  <meta name="twitter:description" content="Web apps, tools and certifications built by Satyam Pandey.">
  <meta name="twitter:image"       content="https://raw.githubusercontent.com/designedBySatyam/assets/main/images/og-image.webp">
  <link rel="canonical" href="https://satyam-pandey27.netlify.app/pages/projects.html">
  <meta name="theme-color" content="#020510">
  <!-- Title -->
  <title>Projects & Certificates | Satyam Pandey</title>
  <!-- Manifest & Icons -->
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap"></noscript>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/projects.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- Nav component — must load before script.js -->
  <script src="../js/nav.js"></script>
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Navigation — injected by js/nav.js -->
  <div id="site-nav"></div>

  <!-- Main -->
  <main class="main-content">

    <header class="page-header">
      <p class="header-decoration">Satyam Pandey</p>
      <h1 class="page-title" id="pageTitle">
        <span class="title-bracket">&lt;</span>
        <span id="titleText">PROJECTS</span>
        <span class="title-bracket">/&gt;</span>
      </h1>

      <div class="toggle-container" role="group" aria-label="View switcher">
        <button class="toggle-btn active" data-view="projects" id="projectsToggle" type="button" aria-pressed="true" aria-controls="projectsSection">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span>Projects</span>
          <span class="toggle-count" id="projectsCount" aria-label="0 projects"></span>
        </button>
        <button class="toggle-btn" data-view="certificates" id="certificatesToggle" type="button" aria-pressed="false" aria-controls="certificatesSection">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="7"/>
            <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
          </svg>
          <span>Certificates</span>
          <span class="toggle-count" id="certificatesCount" aria-label="0 certificates"></span>
        </button>
      </div>

      <p class="page-subtitle" id="pageSubtitle">Innovative solutions at the intersection of technology and creativity</p>
      <div class="header-line"></div>
    </header>

    <!-- Projects Section -->
    <section class="view-section active" id="projectsSection" aria-hidden="false">
      <div class="projects-toolbar">
        <div class="toolbar-group">
          <label for="projectSearchInput" class="toolbar-label">Search</label>
          <input type="text" id="projectSearchInput" class="toolbar-input" placeholder="Search by title, description, tech...">
        </div>
        <div class="toolbar-group">
          <label for="projectStatusFilter" class="toolbar-label">Status</label>
          <select id="projectStatusFilter" class="toolbar-select">
            <option value="all">All</option>
            <option value="completed">Completed</option>
            <option value="active">Active</option>
            <option value="research">Research</option>
            <option value="planning">Planning</option>
          </select>
        </div>
        <div class="toolbar-group">
          <label for="projectSortOrder" class="toolbar-label">Sort</label>
          <select id="projectSortOrder" class="toolbar-select">
            <option value="order-asc">Default</option>
            <option value="title-asc">Title A–Z</option>
            <option value="title-desc">Title Z–A</option>
          </select>
        </div>
      </div>

      <div class="project-chips" id="projectTechChips" aria-label="Quick technology filters"></div>
      <p class="projects-meta" id="projectsMeta" role="status" aria-live="polite">Loading projects...</p>

      <div class="projects-grid" id="projectsGrid">
        <!-- Skeleton loaders -->
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
      </div>
    </section>

    <!-- Certificates Section -->
    <section class="view-section" id="certificatesSection" aria-hidden="true">
      <div class="certificates-container">
        <aside class="certificates-list-panel">
          <div class="panel-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="7"/>
              <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
            </svg>
            <h2>My Certificates</h2>
          </div>
          <div class="certificates-list" id="certificatesList" role="listbox" aria-label="Certificates">
            <!-- Loaded from Firebase -->
          </div>
        </aside>

        <section class="certificate-viewer-panel">
          <div class="viewer-header">
            <h3 id="viewerTitle">Certificate Preview</h3>
            <div class="viewer-actions">
              <button class="viewer-action-btn" id="zoomCertificateBtn" type="button" style="display:none;">Zoom</button>
              <a class="viewer-action-btn" id="downloadCertificateBtn" href="#" download style="display:none;">Download</a>
              <button class="close-viewer" id="closeViewer" type="button" style="display:none;" aria-label="Close certificate preview">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="viewer-container">
            <div class="viewer-placeholder" id="certPlaceholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <circle cx="12" cy="8" r="7"/>
                <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
              </svg>
              <p>Select a certificate to preview</p>
            </div>
            <img id="certViewer" class="cert-image" alt="Certificate preview" loading="lazy">
          </div>
          <div class="cert-details" id="certDetails" style="display:none;">
            <div class="detail-item">
              <span class="detail-label">Issuer</span>
              <span class="detail-value" id="certIssuer">-</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Issued</span>
              <span class="detail-value" id="certDate">-</span>
            </div>
          </div>
        </section>
      </div>
    </section>

    <!-- Page Navigation -->
    <nav class="page-navigation">
      <a href="resume.html" class="nav-btn secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        VIEW RESUME
      </a>
      <a href="contact.html" class="nav-btn primary">
        GET IN TOUCH
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </nav>

  </main>


  <!-- Project Detail Modal -->
  <div class="project-modal-overlay" id="projectModal" aria-modal="true" role="dialog" aria-label="Project details" aria-hidden="true">
    <div class="project-modal-box">
      <button class="project-modal-close" id="projectModalClose" aria-label="Close project details">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="pmodal-header">
        <div class="pmodal-icon" id="pmodalIcon"></div>
        <div class="pmodal-title-group">
          <h2 class="pmodal-title" id="pmodalTitle"></h2>
          <span class="pmodal-status" id="pmodalStatus"></span>
        </div>
      </div>

      <p class="pmodal-desc" id="pmodalDesc"></p>

      <div class="pmodal-section">
        <span class="pmodal-label">Tech Stack</span>
        <div class="pmodal-tech" id="pmodalTech"></div>
      </div>

      <div class="pmodal-actions" id="pmodalActions"></div>
    </div>
  </div>


  <!-- Certificate Lightbox -->
  <div class="cert-lightbox" id="certLightbox" aria-modal="true" role="dialog" aria-label="Certificate fullscreen view" aria-hidden="true">
    <button class="cert-lightbox-close" id="certLightboxClose" aria-label="Close fullscreen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="cert-lightbox-nav prev" id="certLightboxPrev" aria-label="Previous certificate">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="cert-lightbox-content">
      <img class="cert-lightbox-img" id="certLightboxImg" alt="Certificate fullscreen" src="">
      <div class="cert-lightbox-info">
        <span class="cert-lightbox-title" id="certLightboxTitle"></span>
        <span class="cert-lightbox-issuer" id="certLightboxIssuer"></span>
      </div>
    </div>
    <button class="cert-lightbox-nav next" id="certLightboxNext" aria-label="Next certificate">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- Floating Admin Link -->
  <a class="admin-fab" href="admin.html" aria-label="Open admin page">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Admin</span>
  </a>

  <script src="../js/firebase-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/shared-utils.js"></script>
  <script src="../js/projects.js"></script>
</body>
</html>
