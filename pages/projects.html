<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Satyam Pandey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/projects.css">
    <script src="js/auth.js"></script>
</head>
<body>
    <div class="blob"></div>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>

    <div class="projects-container">
        <header class="project-header">
            <h1>My Projects</h1>
            <p>A showcase of my technical work and academic explorations</p>
            <button class="btn btn-primary add-project-btn" onclick="openProjectModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Project
            </button>
        </header>

        <div class="projects-grid" id="projects-grid">
            <!-- Projects will be dynamically loaded here -->
        </div>

        <div class="projects-footer">
            <a href="../index.html" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Home
            </a>
            <a href="resume.html" class="nav-btn btn-secondary">
                View Resume
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            </a>
            <a href="contact.html" class="nav-btn">
                Contact Me
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </a>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Project</h2>
                <button class="close-btn" onclick="closeProjectModal()">&times;</button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                
                <div class="form-group">
                    <label for="projectName">Project Name *</label>
                    <input type="text" id="projectName" required>
                </div>

                <div class="form-group">
                    <label for="projectDescription">Description *</label>
                    <textarea id="projectDescription" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="projectIcon">Icon (choose one)</label>
                    <select id="projectIcon">
                        <option value="database">Database</option>
                        <option value="cpu">CPU/Hardware</option>
                        <option value="smartphone">Mobile</option>
                        <option value="layout">Web Design</option>
                        <option value="code">Code</option>
                        <option value="server">Server</option>
                        <option value="globe">Web</option>
                        <option value="terminal">Terminal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="projectTags">Tags (comma separated)</label>
                    <input type="text" id="projectTags" placeholder="e.g., JavaScript, React, Node.js">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="closeProjectModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/projects.js"></script>
</body>
</html>
