<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | Satyam Pandey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap">
  <script src="js/nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020510;
      --text:      #e8eaf6;
      --text-muted:#8b8fa8;
      --cyan:      #00f5ff;
      --accent:    #4f8ef7;
      --pink:      #f74f8e;
      --border:    rgba(79,142,247,0.15);
      --surface:   rgba(79,142,247,0.05);
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --nav-h:     64px;
      --grad-primary: linear-gradient(135deg, #4f8ef7, #00f5ff);
    }

    html, body {
      min-height: 100vh;
      font-family: var(--font-display);
      color: var(--text);
      background: radial-gradient(900px 500px at 80% -5%, rgba(79,142,247,0.18), transparent 60%),
                  radial-gradient(700px 500px at -10% 90%, rgba(247,79,142,0.12), transparent 60%),
                  linear-gradient(180deg, #020510, #05091a);
      overflow-x: hidden;
    }

    /* Grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 44px, rgba(79,142,247,0.04) 44px, rgba(79,142,247,0.04) 45px),
        repeating-linear-gradient(90deg, transparent, transparent 44px, rgba(79,142,247,0.04) 44px, rgba(79,142,247,0.04) 45px);
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    .nav-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(2,5,16,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 900;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--nav-h) 24px 60px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    /* Glitch 404 */
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      animation: glitch404 4s infinite;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-code::before {
      animation: glitchTop 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translate(-3px, -3px);
    }
    .error-code::after {
      animation: glitchBottom 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translate(3px, 3px);
    }

    @keyframes glitch404 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }
    @keyframes glitchTop {
      0%, 90%, 100% { opacity: 0; }
      91%, 95%      { opacity: 0.7; }
    }
    @keyframes glitchBottom {
      0%, 88%, 100% { opacity: 0; }
      89%, 93%      { opacity: 0.6; }
    }

    .error-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 16px;
      display: block;
    }
    .error-tag::before { content: '// '; opacity: 0.5; }

    .error-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Scan line decoration */
    .scan-box {
      width: 160px;
      height: 2px;
      background: var(--grad-primary);
      margin: 24px auto;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .scan-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: scanSlide 2s ease-in-out infinite;
    }
    @keyframes scanSlide {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Actions */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }

    .btn-primary {
      background: var(--grad-primary);
      color: #020510;
      box-shadow: 0 0 24px rgba(0,245,255,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,245,255,0.35); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: rgba(79,142,247,0.4); color: var(--text); background: var(--surface); }

    /* Status bar */
    .status-bar {
      margin-top: 48px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 6px var(--pink);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div id="site-nav"></div>

  <main>
    <div class="container">
      <span class="error-tag">ERROR_CODE :: 0x404</span>
      <div class="error-code" aria-label="404">404</div>
      <div class="scan-box"></div>
      <h1 class="error-title">Signal Lost</h1>
      <p class="error-desc">
        The page you're looking for doesn't exist, was moved,
        or the coordinates were never in the system.
      </p>

      <div class="actions">
        <a href="index.html" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Return Home
        </a>
        <a href="pages/contact.html" class="btn btn-secondary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Report Issue
        </a>
      </div>

      <div class="status-bar">
        <span class="status-dot"></span>
        <span>SYS.STATUS :: PAGE_NOT_FOUND — Node offline</span>
      </div>
    </div>
  </main>

</body>
</html>
