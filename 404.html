<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Signal Lost | Satyam Pandey</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="css/style.css?v=20260317d">
  <script src="js/nav.js?v=20260305d"></script>
  <script src="js/script.js?v=20260317c" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020510;
      --text:      #e8eaf6;
      --text-muted:#8b8fa8;
      --cyan:      #00f5ff;
      --accent:    #4f8ef7;
      --pink:      #f74f8e;
      --border:    rgba(79,142,247,0.15);
      --surface:   rgba(79,142,247,0.05);
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --nav-h:     64px;
      --grad-primary: linear-gradient(135deg, #4f8ef7, #00f5ff);
    }

    body.theme-dotgrid {
      --bg-base: #05040a;
      --bg: #05040a;
      --accent: #a78bfa;
      --cyan: #a78bfa;
      --text: rgba(235, 228, 255, 0.92);
      --text-muted: rgba(180, 165, 220, 0.72);
      --border: rgba(167, 139, 250, 0.18);
      --surface: rgba(255, 255, 255, 0.04);
      --grad-primary: linear-gradient(135deg, #a78bfa, #7c5ce0);
      background: var(--bg-base);
      background-image: none;
    }

    [data-theme="light"] body.theme-dotgrid {
      --bg-base: #f5f2fb;
      --bg: #f5f2fb;
      --accent: #6d4cd6;
      --cyan: #6d4cd6;
      --text: #181528;
      --text-muted: #3f3564;
      --border: rgba(110, 90, 190, 0.24);
      --surface: rgba(255, 255, 255, 0.72);
      --grad-primary: linear-gradient(135deg, #6d4cd6, #a88bff);
    }

    body.theme-dotgrid::before { display: none; }

    body.theme-dotgrid .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    body.theme-dotgrid .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(180,155,255,0.22) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      background-position: center center;
    }

    body.theme-dotgrid .bloom {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 25% 35%, rgba(120, 60, 220, 0.07) 0%, transparent 100%),
        radial-gradient(ellipse 40% 35% at 78% 70%, rgba(80, 40, 180, 0.05) 0%, transparent 100%);
    }

    body.theme-dotgrid .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 65% at 50% 50%,
        transparent 0%,
        rgba(5, 4, 10, 0.55) 55%,
        rgba(5, 4, 10, 0.92) 80%,
        #05040a 100%
      );
    }

    [data-theme="light"] body.theme-dotgrid .bloom {
      background:
        radial-gradient(ellipse 50% 40% at 25% 35%, rgba(109, 76, 214, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 40% 35% at 78% 70%, rgba(168, 139, 255, 0.06) 0%, transparent 100%);
    }

    [data-theme="light"] body.theme-dotgrid .vignette {
      background: radial-gradient(
        ellipse 70% 65% at 50% 50%,
        transparent 0%,
        rgba(245, 242, 251, 0.5) 55%,
        rgba(245, 242, 251, 0.9) 80%,
        #f5f2fb 100%
      );
    }

    body.theme-dotgrid #particle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.6;
    }

    [data-theme="light"] body.theme-dotgrid #particle-canvas {
      opacity: 0.35;
    }

    html, body {
      min-height: 100vh;
      font-family: var(--font-display);
      color: var(--text);
      background: radial-gradient(900px 500px at 80% -5%, rgba(79,142,247,0.18), transparent 60%),
                  radial-gradient(700px 500px at -10% 90%, rgba(247,79,142,0.12), transparent 60%),
                  linear-gradient(180deg, #020510, #05091a);
      overflow-x: hidden;
    }

    /* Grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 44px, rgba(79,142,247,0.04) 44px, rgba(79,142,247,0.04) 45px),
        repeating-linear-gradient(90deg, transparent, transparent 44px, rgba(79,142,247,0.04) 44px, rgba(79,142,247,0.04) 45px);
      pointer-events: none;
      z-index: 0;
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--nav-h) 24px 60px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    /* Glitch 404 */
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      animation: glitch404 4s infinite;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-code::before {
      animation: glitchTop 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translate(-3px, -3px);
    }
    .error-code::after {
      animation: glitchBottom 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translate(3px, 3px);
    }

    @keyframes glitch404 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }
    @keyframes glitchTop {
      0%, 90%, 100% { opacity: 0; }
      91%, 95%      { opacity: 0.7; }
    }
    @keyframes glitchBottom {
      0%, 88%, 100% { opacity: 0; }
      89%, 93%      { opacity: 0.6; }
    }

    .error-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 16px;
      display: block;
    }
    .error-tag::before { content: '// '; opacity: 0.5; }

    .error-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Scan line decoration */
    .scan-box {
      width: 160px;
      height: 2px;
      background: var(--grad-primary);
      margin: 24px auto;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .scan-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: scanSlide 2s ease-in-out infinite;
    }
    @keyframes scanSlide {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Actions */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }

    .btn-primary {
      background: var(--grad-primary);
      color: #020510;
      box-shadow: 0 0 24px rgba(0,245,255,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,245,255,0.35); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: rgba(79,142,247,0.4); color: var(--text); background: var(--surface); }

    /* Status bar */
    .status-bar {
      margin-top: 48px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 6px var(--pink);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
  <body class="theme-dotgrid">

  <div class="bg-wrap" aria-hidden="true">
    <div class="dot-grid"></div>
    <div class="bloom"></div>
    <div class="vignette"></div>
    <canvas id="particle-canvas"></canvas>
  </div>

  <div id="site-nav"></div>

  <main>
    <div class="container">
      <span class="error-tag">ERROR_CODE :: 0x404</span>
      <div class="error-code" aria-label="404">404</div>
      <div class="scan-box"></div>
      <h1 class="error-title">Signal Lost</h1>
      <p class="error-desc">
        The page you're looking for doesn't exist, was moved,
        or the coordinates were never in the system.
      </p>

      <div class="actions">
        <a href="#" id="returnHomeBtn" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Return Home
        </a>
        <a href="#" id="reportIssueBtn" class="btn btn-secondary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Report Issue
        </a>
      </div>

      <div class="status-bar">
        <span class="status-dot"></span>
        <span>SYS.STATUS :: PAGE_NOT_FOUND — Node offline</span>
      </div>
    </div>
  </main>

  <script>
    (function setSafe404Links() {
      const path = window.location.pathname || '/';
      const repoPrefix = path.includes('/my-portfolio/') ? '/my-portfolio' : '';

      const homeHref = `${repoPrefix}/index.html`;
      const contactHref = `${repoPrefix}/pages/contact.html`;

      const homeBtn = document.getElementById('returnHomeBtn');
      const reportBtn = document.getElementById('reportIssueBtn');
      if (homeBtn) homeBtn.setAttribute('href', homeHref);
      if (reportBtn) reportBtn.setAttribute('href', contactHref);
    })();
  </script>
</body>
</html>
