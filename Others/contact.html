<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Satyam Pandey</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="contact.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="blob"></div>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>

    <div class="contact-container">
        <div class="contact-card">
    <div class="contact-main-grid">
        
        <div class="contact-left">
            <div class="contact-header">
                <h1>Let's Connect</h1>
                <p>Ready to discuss software architecture, 3D modeling, or your next big idea?</p>
            </div>
            
            <form id="contact-form">
                <div class="input-group">
                    <input type="text" name="user_name" placeholder="Name" required>
                    <input type="email" name="user_email" placeholder="Email" required>
                    <textarea name="message" placeholder="Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            
            <a href="../index.html" class="back-link">← Back to Home</a>
        </div>

        <div class="contact-right">
            <h3>Quick Connections</h3>
            <div class="social-column">
                <a href="https://github.com/designedBySatyam" class="social-card" target="_blank">
                    <div class="icon-box"><i data-lucide="github"></i></div>
                    <div class="social-text">
                        <span class="platform">GitHub</span>
                        <span class="username">@designedBySatyam</span>
                    </div>
                </a>

                <a href="https://www.linkedin.com/in/satyampandey27" class="social-card" target="_blank">
                    <div class="icon-box"><i data-lucide="linkedin"></i></div>
                    <div class="social-text">
                        <span class="platform">LinkedIn</span>
                        <span class="username">Satyam Pandey</span>
                    </div>
                </a>

                <a href="mailto:hello.satyam27@gmail.com" class="social-card">
                    <div class="icon-box"><i data-lucide="mail"></i></div>
                    <div class="social-text">
                        <span class="platform">Email</span>
                        <span class="username">hello.satyam27@gmail.com</span>
                    </div>
                </a>
            </div>
        </div>

    </div> </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("ERcS2hOvR_hVjIE4G");
        })();
    </script>
    <script src="contact.js" defer></script>
    <script src="../script.js" defer></script>
    <script>
        window.addEventListener('load', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
